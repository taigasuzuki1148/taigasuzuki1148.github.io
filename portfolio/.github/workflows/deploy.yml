name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1) Astro をビルド（dist/ ができる）
      - run: npm ci
      - run: npm run build

      # 2) Slidev を /qi4u_day1/ としてビルドして、Astroの dist に合流
      #    ↓ここは Slidev の場所に合わせて cd を変更
      - name: Build Slidev into /qi4u_day1/
        run: |
          cd qi4u_day1
          npm ci
          npm run build -- --base /qi4u_day1/
          mkdir -p ../dist/qi4u_day1
          cp -r dist/* ../dist/qi4u_day1/

      # 3) まとめた dist を Pages にアップロード
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4